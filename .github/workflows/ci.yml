name: CI

# Correctness gate: typecheck + production build, then every Storybook story in
# headless Chromium (render + interaction + axe a11y) in BOTH light and dark.
# Mirrors the local `npm run build` + `npm test` gate documented in AGENTS.md.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Storybook's addon-vitest runs stories as tests in real Chromium via
      # Playwright — the browser binary must be present in CI.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build (tsc + vite)
        run: npm run build

      # The package consumers install (dist-lib via tsup) — keep it building so
      # `npm run build:lib` + the prepack hook can never silently rot.
      - name: Build library (tsup → dist-lib)
        run: npm run build:lib

      - name: Token contrast (WCAG AA, light + dark)
        run: npm run check:contrast

      - name: Design principles (manifest-driven golden rules)
        run: npm run check:principles

      - name: Figma manifest drift (component axes vs code)
        run: npm run check:figma

      - name: Test (Storybook stories, light + dark, a11y)
        run: npm test
