name: Chromatic

# Visual regression on Storybook. Complements the CI gate (render + interaction +
# axe) with pixel-level diffs per story. Non-blocking: visual changes are reported
# for review in Chromatic but do not fail the job or gate merges.
#
# Requires a repo secret CHROMATIC_PROJECT_TOKEN (Chromatic → Manage → Configure).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main] # establish/update the visual baseline on main

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Chromatic needs full git history for baselines + TurboSnap

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: build-storybook # reuse the repo's Storybook build
          onlyChanged: true # TurboSnap — only snapshot stories affected by the change
          exitZeroOnChanges: true # non-blocking — report diffs without failing the job
